spring:
  application:
    name: authsphere

  datasource:
    url: jdbc:postgresql://localhost:5432/authsphere
    username: authsphere
    password: authsphere123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  mail:
    host: sandbox.smtp.mailtrap.io
    port: 2525
    username: f9baa17343474c
    password: 38df4c990a8a9e
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: "ThisIsAVeryLongSecretKeyForJWTSigningThatMustBeAtLeast256BitsLongEnoughForHS256Algorithm!!@@##$$"
  access-token-expiry: 900000
  refresh-token-expiry: 2592000000

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    try-it-out-enabled: true
